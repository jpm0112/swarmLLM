name: Build website into docs

on:
  push:
    branches: ['main']
    paths:
      - 'website/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: 'docs-site'
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build website
        working-directory: website
        run: npm run build

      - name: Sync generated site into docs
        run: |
          rm -rf docs/assets docs/index.html docs/favicon.svg docs/icons.svg docs/.nojekyll
          cp -R website/dist/. docs/
          touch docs/.nojekyll

      - name: Commit updated docs site
        run: |
          if [ -z "$(git status --porcelain -- docs)" ]; then
            echo "No docs changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "Update docs site from website"
          git push origin "${{ github.ref_name }}"
