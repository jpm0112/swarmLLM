name = "vllm-metal-local"
kind = "vllm-metal"
request_timeout = 300
default_max_concurrent_agents = 6

[coordinator]
model = "qwen2.5-coder-14b"
temperature = 0.4
max_tokens = 8192

[worker]
model = "qwen2.5-coder-14b"
temperature = 1.0
max_tokens = 4096

[[coordinator_endpoints]]
label = "vllm-metal-primary"
base_url = "http://127.0.0.1:8000/v1"
api_key_env = "SWARMLLM_VLLM_METAL_API_KEY"

[[worker_endpoints]]
label = "vllm-metal-primary"
base_url = "http://127.0.0.1:8000/v1"
api_key_env = "SWARMLLM_VLLM_METAL_API_KEY"
weight = 1
