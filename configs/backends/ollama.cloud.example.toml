name = "ollama-cloud"
kind = "ollama"
request_timeout = 300
default_max_concurrent_agents = 8

[coordinator]
model = "qwen2.5-coder:14b"
temperature = 0.4
max_tokens = 8192

[worker]
model = "qwen2.5-coder:14b"
temperature = 1.0
max_tokens = 4096

[[coordinator_endpoints]]
label = "ollama-cloud"
base_url = "https://ollama.com/v1"
api_key_env = "OLLAMA_API_KEY"

[[worker_endpoints]]
label = "ollama-cloud"
base_url = "https://ollama.com/v1"
api_key_env = "OLLAMA_API_KEY"
weight = 1
