name = "ollama-cloud"
kind = "ollama"
request_timeout = 300
default_max_concurrent_agents = 4

[coordinator]
model = "devstral-small-2:24b"
temperature = 0.7
max_tokens = 8192

[worker]
model = "devstral-small-2:24b"
temperature = 0.2
max_tokens = 4096

[[coordinator_endpoints]]
label = "ollama-cloud"
base_url = "https://ollama.com/v1"
api_key_env = "OLLAMA_API_KEY"

[[worker_endpoints]]
label = "ollama-cloud"
base_url = "https://ollama.com/v1"
api_key_env = "OLLAMA_API_KEY"
weight = 1
