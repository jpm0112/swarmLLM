name = "vllm-single-node"
kind = "vllm"
request_timeout = 300
default_max_concurrent_agents = 12

[coordinator]
model = "Qwen/Qwen2.5-Coder-32B-Instruct-AWQ"
temperature = 0.4
max_tokens = 2048

[worker]
model = "Qwen/Qwen2.5-Coder-32B-Instruct-AWQ"
temperature = 1.0
max_tokens = 3072

[[coordinator_endpoints]]
label = "vllm-primary"
base_url = "http://127.0.0.1:8000/v1"
api_key_env = "SWARMLLM_VLLM_API_KEY"

[[worker_endpoints]]
label = "vllm-primary"
base_url = "http://127.0.0.1:8000/v1"
api_key_env = "SWARMLLM_VLLM_API_KEY"
weight = 1

